name: CI/CD Pipeline

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # 1. Проверка формата Dockerfile (Hadolint)
  lint-dockerfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Run Hadolint (Dockerfile linter)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

  # 2. Статический анализ безопасности (Trivy)
  security-scan:
    runs-on: ubuntu-latest
    needs: lint-dockerfile
    steps:
      - uses: actions/checkout@v3
      
      - name: Build Docker image for scanning
        uses: docker/build-push-action@v4
        with:
          context: .
          load: true
          tags: app:scan
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'app:scan'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  # 3. Интеграционные тесты (поднимаем Compose)
  integration-tests:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          load: true
          tags: app:test
      
      - name: Start services for testing
        run: |
          docker compose -f docker-compose.yml up -d postgres redis
          sleep 10
      
      - name: Run application
        run: |
          docker run -d --name app-test \
            --network fastapi-network \
            -e DB_HOST=postgres \
            -e REDIS_HOST=redis \
            app:test \
            bash -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
          sleep 10
      
      - name: Test health endpoint
        run: |
          docker exec app-test python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()" || exit 1
      
      - name: Test main endpoint
        run: |
          docker exec app-test python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/').read()" || exit 1
      
      - name: Test stats endpoint
        run: |
          docker exec app-test python -c "import urllib.request, json; data = urllib.request.urlopen('http://localhost:8000/stats').read(); print('Stats OK')" || exit 1
      
      - name: Cleanup
        if: always()
        run: |
          docker compose -f docker-compose.yml down
          docker rm -f app-test || true

  # 4. Сборка и публикация образа
  build-and-push:
    needs: integration-tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=stable,enable={{is_default_branch}}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 5. Уведомление в Telegram (творческое задание)
  notify:
    needs: [build-and-push, security-scan, integration-tests]
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Get commit SHA
        id: commit
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      
      - name: Send Telegram notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            📦 **CI/CD Pipeline**
            📝 Commit: `${{ steps.commit.outputs.sha }}`
            📂 Repository: ${{ github.repository }}
            🌿 Branch: ${{ github.ref_name }}
            📊 Status: ${{ job.status }}
            
            ${{ job.status == 'success' && '✅ **УСПЕШНО**' || '❌ **ОШИБКА**' }}