name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: kiriezhkara/fastapi-counter-app

jobs:
  lint-dockerfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning
          ignore: DL3008,DL3015

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build image for scanning
        uses: docker/build-push-action@v4
        with:
          context: .
          load: true
          tags: app:scan
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'app:scan'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          load: true
          tags: app:test
          no-cache: true
      - name: Start services
        run: |
          docker compose -f docker-compose.yml up -d postgres redis
          sleep 10
      - name: Run application
        run: |
          docker run -d --name app-test --network fastapi-network -e DB_HOST=postgres -e REDIS_HOST=redis app:test bash -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
          sleep 15
      - name: Check container status
        run: |
          echo "=== CONTAINER STATUS ==="
          docker ps -a
          echo "=== CONTAINER LOGS ==="
          docker logs app-test || true
      - name: Test health
        run: |
          docker exec app-test python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()" || exit 1
      - name: Test main
        run: |
          docker exec app-test python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/').read()" || exit 1
      - name: Test stats
        run: |
          docker exec app-test python -c "import urllib.request, json; data = urllib.request.urlopen('http://localhost:8000/stats').read(); print('Stats OK')" || exit 1
      - name: Cleanup
        if: always()
        run: |
          docker compose -f docker-compose.yml down
          docker rm -f app-test || true

  build-and-push:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Log in to Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set tags
        id: tags
        run: |
          SHA=$(git rev-parse --short HEAD)
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:stable,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$SHA" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_name }}" == feature/* ]]; then
            BRANCH_NAME=$(echo "${{ github.ref_name }}" | sed 's/feature\///')
            echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-$BRANCH_NAME" >> $GITHUB_OUTPUT
          else
            echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi
      - name: Check image size
        run: |
          docker build -t app:temp .
          SIZE=$(docker images app:temp --format "{{.Size}}" | grep -o '^[0-9]*' | head -1)
          echo "Image size: ${SIZE}MB"
          if [ $SIZE -gt 300 ]; then
            echo "❌ Image size exceeds 300MB!"
            exit 1
          fi
          echo "✅ Image size OK"
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
      
      - name: Check secrets
        run: |
          echo "🔑 Checking secrets..."
          if [ -z "${{ secrets.SERVER_HOST }}" ]; then
            echo "⚠️ SERVER_HOST not set"
          fi
      
      - name: Deploy
        run: |
          echo "📦 Deploying..."
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:stable"
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:stable || echo "Image not found"
      
      - name: Run app for health check
        run: |
          echo "🚀 Запуск приложения для проверки..."
          echo "Попытка запуска из registry..."
          docker run -d --name deploy-app \
            --network fastapi-network \
            -e DB_HOST=postgres \
            -e REDIS_HOST=redis \
            -p 8000:8000 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:stable || {
            echo "❌ Не удалось запустить из registry, пробуем локальный образ..."
            docker run -d --name deploy-app \
              --network fastapi-network \
              -e DB_HOST=postgres \
              -e REDIS_HOST=redis \
              -p 8000:8000 \
              z1-app
          }
          echo "⏳ Ожидание 15 секунд..."
          sleep 15
          echo ""
          echo "=== СТАТУС КОНТЕЙНЕРА ==="
          docker ps -a
          echo ""
          echo "=== ЛОГИ КОНТЕЙНЕРА ==="
          docker logs deploy-app || echo "❌ Контейнер не запустился или нет логов"
      
      - name: Health check
        id: healthcheck
        run: |
          echo "🔍 Health check..."
          curl -f http://localhost:8000/health || exit 1
      
      - name: Rollback
        if: failure() && steps.healthcheck.outcome == 'failure'
        run: |
          echo "🔄 Rolling back..."
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:previous || echo "No previous version"
      
      - name: Cleanup
        if: always()
        run: |
          docker rm -f deploy-app || true
      
      - name: Result
        run: |
          if [ ${{ steps.healthcheck.outcome }} == 'success' ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed"
            exit 1
          fi