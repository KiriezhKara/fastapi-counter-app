name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        load: true
        tags: app:test
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Start services for testing
      run: |
        docker compose -f docker-compose.yml up -d postgres redis
        sleep 10
    
    - name: Run application
      run: |
        docker run -d --name app-test \
          --network fastapi-network \
          -e DB_HOST=postgres \
          -e REDIS_HOST=redis \
          app:test
        sleep 5
    
    - name: Check container status
      run: |
        docker ps
        docker logs app-test
    
    - name: Test health endpoint
      run: |
        docker exec app-test python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()" || exit 1
    
    - name: Test main endpoint
      run: |
        docker exec app-test python -c "import urllib.request; response = urllib.request.urlopen('http://localhost:8000/'); assert response.getcode() == 200; print('Main page OK')" || exit 1
    
    - name: Test stats endpoint
      run: |
        docker exec app-test python -c "import urllib.request, json; data = urllib.request.urlopen('http://localhost:8000/stats').read(); print('Stats OK:', data)" || exit 1
    
    - name: Test counter increment
      run: |
        docker exec app-test python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/').read(); data = urllib.request.urlopen('http://localhost:8000/stats').read(); print('Counter test OK')" || exit 1
    
    - name: Cleanup
      if: always()
      run: |
        docker compose -f docker-compose.yml down
        docker rm -f app-test || true

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      packages: write
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Log in to Container Registry
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=sha,prefix=
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to production
      run: |
        echo "Deploying to production environment..."
        echo "Using docker-compose.prod.yml"
        echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"