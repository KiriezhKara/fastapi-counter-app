name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: kiriezhkara/fastapi-counter-app

jobs:
  lint-dockerfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Run Hadolint (Dockerfile linter)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning
          ignore: DL3008,DL3015

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Build Docker image for scanning
        uses: docker/build-push-action@v4
        with:
          context: .
          load: true
          tags: app:scan
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'app:scan'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          load: true
          tags: app:test
          no-cache: true
      
      - name: Start services for testing
        run: |
          docker compose -f docker-compose.yml up -d postgres redis
          sleep 10
      
      - name: Run application
        run: |
          docker run -d --name app-test \
            --network fastapi-network \
            -e DB_HOST=postgres \
            -e REDIS_HOST=redis \
            app:test \
            bash -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
          sleep 15
      
      - name: Check container status
        run: |
          echo "=== CONTAINER STATUS ==="
          docker ps -a
          echo "=== CONTAINER LOGS ==="
          docker logs app-test || true
          echo "=== END LOGS ==="
      
      - name: Test health endpoint
        run: |
          docker exec app-test python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()" || exit 1
      
      - name: Test main endpoint
        run: |
          docker exec app-test python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/').read()" || exit 1
      
      - name: Test stats endpoint
        run: |
          docker exec app-test python -c "import urllib.request, json; data = urllib.request.urlopen('http://localhost:8000/stats').read(); print('Stats OK')" || exit 1
      
      - name: Cleanup
        if: always()
        run: |
          docker compose -f docker-compose.yml down
          docker rm -f app-test || true

  # ================================================================
  # ЗАДАНИЕ 4: СБОРКА АРТЕФАКТОВ И ТЕГИРОВАНИЕ
  # ================================================================
  build-and-push:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set Docker tags
        id: tags
        run: |
          SHA=$(git rev-parse --short HEAD)
          echo "📌 Определение тегов..."
          
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "✅ Ветка main → теги: stable, $SHA"
            echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:stable,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$SHA" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_name }}" == feature/* ]]; then
            BRANCH_NAME=$(echo "${{ github.ref_name }}" | sed 's/feature\///')
            echo "✅ Ветка feature → тег: dev-$BRANCH_NAME"
            echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-$BRANCH_NAME" >> $GITHUB_OUTPUT
          else
            echo "✅ Другая ветка → тег: ${{ github.ref_name }}"
            echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi
      
      - name: Check image size
        id: size
        run: |
          echo "📊 Сборка образа для проверки размера..."
          docker build -t app:temp .
          
          SIZE=$(docker images app:temp --format "{{.Size}}" | grep -o '^[0-9]*' | head -1)
          echo "📊 Размер образа: ${SIZE} МБ"
          
          if [ $SIZE -gt 300 ]; then
            echo "❌ ОШИБКА: Размер образа ${SIZE} МБ превышает лимит 300 МБ!"
            exit 1
          fi
          echo "✅ Размер образа ${SIZE} МБ в пределах лимита (300 МБ)"
          
          echo "size=${SIZE}" >> $GITHUB_OUTPUT
      
      - name: Build and push Docker image with smart tags
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}

  # ================================================================
  # ЗАДАНИЕ 5: CD (Continuous Delivery) и окружения
  # ================================================================
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Check secrets
        run: |
          echo "🔑 Проверка секретов..."
          if [ -z "${{ secrets.SERVER_HOST }}" ]; then
            echo "⚠️ SERVER_HOST secret not set, using localhost"
          fi
          if [ -z "${{ secrets.SERVER_USER }}" ]; then
            echo "⚠️ SERVER_USER secret not set, using user"
          fi
      
      - name: Deploy to server (SSH simulation)
        run: |
          echo "📦 Deploying to server..."
          echo "Server: ${{ secrets.SERVER_HOST || 'localhost' }}"
          echo "User: ${{ secrets.SERVER_USER || 'user' }}"
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:stable"
          
          # Симуляция деплоя через SSH
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:stable || echo "Image not found, using local"
          echo "✅ Deploy completed"
      
      - name: Health check after deploy
        id: healthcheck
        run: |
          echo "🔍 Checking health..."
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          echo "✅ Health check passed"
      
      - name: Rollback on failure
        if: failure() && steps.healthcheck.outcome == 'failure'
        run: |
          echo "🔄 Rolling back to previous version..."
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:previous || echo "No previous version, using latest"
          echo "✅ Rollback completed"
      
      - name: Deployment result
        run: |
          if [ ${{ steps.healthcheck.outcome }} == 'success' ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed, rollback performed"
            exit 1
          fi